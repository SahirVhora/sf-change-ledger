name: Bug report
description: Report a reproducible problem in SF Change Ledger
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include client exports, credentials, or employee data.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include an anonymised minimal example where possible.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Python version, operating system, browser
    validations:
      required: true
