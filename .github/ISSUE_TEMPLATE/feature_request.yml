name: Feature request
description: Suggest a parser, report, or workflow improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Which SuccessFactors workflow or export format needs support?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the finding or report that would be useful.
    validations:
      required: true
