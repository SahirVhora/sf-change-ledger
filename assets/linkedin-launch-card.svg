  <text x="56" y="140" fill="#0f766e" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="1">THE TRANSPORT SUCCEEDED.</text>
  <text x="56" y="204" fill="#17324d" font-family="Arial, sans-serif" font-size="50" font-weight="700">But what actually changed?</text>
  <text x="58" y="246" fill="#5b717d" font-family="Arial, sans-serif" font-size="21">Turn raw SuccessFactors exports into risk findings and a focused regression scope.</text>

