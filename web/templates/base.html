<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{% block title %}SF Change Ledger{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="{{ url_for('index') }}" aria-label="SF Change Ledger home">
      <img src="{{ url_for('static', filename='favicon.svg') }}" alt="">
      <span>SF Change Ledger</span>
    </a>
    <span class="header-status">Local configuration analysis</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
